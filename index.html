<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Diorama</title>
<style>
  body { font-family: sans-serif; text-align: center; padding: 20px; transition: background 0.5s; }
  .custom-icon { height: 150px; margin: 10px 0; }
  .card-container { display: flex; gap: 10px; justify-content: center; }
  .card { background: white; padding: 15px; border-radius: 15px; width: 45%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  iframe { width: 100%; max-width: 500px; height: 200px; border: none; margin-top: 10px; }
</style>
</head>
<body id="bg" style="background:#eafff0">
  <h1>Smart Diorama</h1>
  <img src="4.png" class="custom-icon" id="mainIcon">
  <div class="card-container">
    <div class="card"><h4>Bụi</h4><h2 id="buiVal">--</h2></div>
    <div class="card"><h4>Đèn</h4><h2 id="denVal">--%</h2></div>
  </div>
  
  <div class="chart-section">
    <iframe src="https://thingspeak.com/channels/3407526/charts/1?dynamic=true&results=30&type=line"></iframe>
    <iframe src="https://thingspeak.com/channels/3407526/charts/2?dynamic=true&results=30&type=line"></iframe>
  </div>

  <script>
    function update() {
      fetch("https://api.thingspeak.com/channels/3407526/feeds/last.json")
        .then(r => r.json()).then(d => {
          let b = parseInt(d.field1), dn = parseInt(d.field2);
          document.getElementById('buiVal').innerText = b;
          document.getElementById('denVal').innerText = dn + '%';
          let img = document.getElementById('mainIcon');
          if(b < 1500) { img.src='4.png'; document.body.style.background='#eafff0'; }
          else if(b < 2500) { img.src='5.png'; document.body.style.background='#fffde7'; }
          else { img.src='6.png'; document.body.style.background='#ffebee'; }
        });
    }
    setInterval(update, 3000); // Tốc độ quét 3s/lần cực nhanh
    update();
  </script>
</body>
</html>
